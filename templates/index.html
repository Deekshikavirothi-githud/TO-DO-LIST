<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between">
        <h2>My Tasks</h2>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <!-- 🔍 Search -->
    <form method="GET">
        <input type="text" name="search" placeholder="Search..." class="form-control my-3">
    </form>

    <!-- ➕ Add Task -->
    <form method="POST" class="d-flex mb-3">
        <input type="text" name="title" class="form-control me-2" placeholder="Task">
        <input type="date" name="due_date" class="form-control me-2">

        <select name="priority" class="form-control me-2">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <button class="btn btn-primary">Add</button>
    </form>

    <!-- 📋 Task List -->
    <ul class="list-group">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between">

            <div>
                {% if task.complete %}
                    <strike>{{ task.title }}</strike>
                {% else %}
                    {{ task.title }}
                {% endif %}

                <br>

                <small class="text-muted">
                    {{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}
                </small>

                <span class="badge bg-warning">{{ task.priority }}</span>
            </div>

            <div>
                <a href="/complete/{{ task.id }}" class="btn btn-success btn-sm">✔</a>
                <a href="/delete/{{ task.id }}" class="btn btn-danger btn-sm">❌</a>
            </div>

        </li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
